name: Release Zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish, e.g. v0.11.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-windows-zip:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows zip package
        run: pnpm electron:build:zip

      - name: Prepare canonical upload asset
        id: prepare
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $source = Get-ChildItem dist -Recurse -File -Filter 'Chill Vibe-*-win.zip' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $source) {
            throw 'No Windows zip artifact found under dist/.'
          }

          $uploadDir = Join-Path $PWD 'dist\release-upload'
          New-Item -ItemType Directory -Force -Path $uploadDir | Out-Null

          $zipName = "Chill.Vibe-$version-win.zip"
          $zipPath = Join-Path $uploadDir $zipName
          Copy-Item -LiteralPath $source.FullName -Destination $zipPath -Force

          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Remove stale in-progress zip assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ZIP_NAME: ${{ steps.prepare.outputs.zip_name }}
        run: |
          $release = gh api repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG | ConvertFrom-Json

          foreach ($asset in @($release.assets)) {
            $isCanonicalZip = $asset.name -eq $env:ZIP_NAME
            $isTempZip = $asset.name -like 'Chill.Vibe-*-win-r*-*.zip'
            $isStale = $asset.state -ne 'uploaded'

            if (($isCanonicalZip -or $isTempZip) -and $isStale) {
              gh api --method DELETE repos/${{ github.repository }}/releases/assets/$($asset.id)
            }
          }

      - name: Upload Windows zip to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload $env:RELEASE_TAG "${{ steps.prepare.outputs.zip_path }}" --clobber

      - name: Verify uploaded asset state and downloadability
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ZIP_NAME: ${{ steps.prepare.outputs.zip_name }}
        run: |
          $release = gh api repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG | ConvertFrom-Json
          $asset = @($release.assets) | Where-Object { $_.name -eq $env:ZIP_NAME } | Select-Object -First 1

          if (-not $asset) {
            throw "Release asset $env:ZIP_NAME was not found after upload."
          }

          if ($asset.state -ne 'uploaded') {
            throw "Release asset $env:ZIP_NAME is in unexpected state: $($asset.state)"
          }

          $statusCode = curl.exe -I -L --silent --show-error --output NUL --write-out "%{http_code}" $asset.browser_download_url
          if ($statusCode -ne '200') {
            throw "Download verification failed for $($asset.browser_download_url) with HTTP $statusCode"
          }

          Write-Host "Verified release asset: $($asset.browser_download_url)"
